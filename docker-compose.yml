version: '3.8'

services:
  db:
    build: ./db
    container_name: tienda-db
    environment:
      MYSQL_ROOT_PASSWORD: admin123
      MYSQL_DATABASE: tienda_perritos
      MYSQL_USER: alumno
      MYSQL_PASSWORD: alumno123
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - tienda-network

  backend:
    build: ./backend
    container_name: tienda-backend
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_USER: alumno
      DB_PASSWORD: alumno123
      DB_NAME: tienda_perritos
      DB_PORT: 3306
      NODE_ENV: production
    ports:
      - "3001:3001"
    networks:
      - tienda-network

  frontend:
    build: ./frontend
    container_name: tienda-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - tienda-network

volumes:
  db_data:

networks:
  tienda-network:
    driver: bridge
