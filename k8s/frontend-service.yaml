apiVersion: v1
kind: Service
metadata:
  name: tienda-frontend
  namespace: tienda
  annotations:
    # Forzamos que sea público y (no interno)
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
spec:
  type: LoadBalancer
  selector:
    app: tienda-frontend
  ports:
    - port: 80
      targetPort: 80
